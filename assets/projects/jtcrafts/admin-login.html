<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - JTC</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>JTC Admin</h1>
            <p class="login-subtitle">Jad Touma Crafts - Admin Portal</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
                <div id="errorMessage" class="error-message"></div>
            </form>
            <div class="login-links">
                <p class="setup-note">First time? Set your credentials on first login.</p>
                <button type="button" id="resetBtn" class="btn btn-secondary" style="margin-top: 1rem; width: 100%;">Reset Credentials</button>
            </div>
        
        </div>
    </div>
    <script src="admin-login.js"></script>
</body>
</html>
