<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Products</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .product { border: 1px solid #E9E4D8; padding: 10px; margin: 10px 0; }
        .no-image { background-color: #ffcccc; }
    </style>
</head>
<body>
    <h1>Products in Storage</h1>
    <div id="products"></div>

    <script>
        const products = JSON.parse(localStorage.getItem('products') || '[]');
        const container = document.getElementById('products');
        
        if (products.length === 0) {
            container.innerHTML = '<p>No products found</p>';
        } else {
            products.forEach((product, index) => {
                const div = document.createElement('div');
                div.className = 'product' + (product.image ? '' : ' no-image');
                div.innerHTML = `
                    <h3>${index + 1}. ${product.name}</h3>
                    <p><strong>ID:</strong> ${product.id}</p>
                    <p><strong>Category:</strong> ${product.category}</p>
                    <p><strong>Description:</strong> ${product.description}</p>
                    <p><strong>Image:</strong> ${product.image ? '✓ Yes' : '✗ NO IMAGE'}</p>
                    ${product.image ? `<p><strong>Image URL:</strong> ${product.image}</p>` : ''}
                    <button onclick="deleteProduct('${product.id}')">Delete This Product</button>
                `;
                container.appendChild(div);
            });
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                let allProducts = JSON.parse(localStorage.getItem('products') || '[]');
                allProducts = allProducts.filter(p => p.id !== id);
                localStorage.setItem('products', JSON.stringify(allProducts));
                location.reload();
            }
        }
    </script>
</body>
</html>
