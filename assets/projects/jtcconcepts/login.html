<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · JTC Concepts</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="logo-pattern login-logo">
      <span>JTC</span><span>JTC</span><span class="concepts">CONCEPTS</span><span>JTC</span><span>JTC</span>
    </div>
    <div class="forms-wrapper">
      <div class="login-card">
        <h2>Access</h2>
        <form id="login-form">
          <input type="email" id="login-email" placeholder="Email" required>
          <input type="password" id="login-password" placeholder="Password" required>
          <button type="submit" class="btn btn-dark">Sign in</button>
          <p id="login-message" class="form-message"></p>
        </form>
      </div>
      <div class="register-card">
        <h2>Register as client</h2>
        <form id="register-form">
          <input type="text" id="reg-name" placeholder="Full name" required>
          <input type="email" id="reg-email" placeholder="Email" required>
          <input type="password" id="reg-password" placeholder="Password" required>
          <button type="submit" class="btn btn-outline-bronze">Create account</button>
          <p id="register-message" class="form-message"></p>
        </form>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
