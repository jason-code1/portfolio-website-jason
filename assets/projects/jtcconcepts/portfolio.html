<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — JTC Concepts</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-flex">
      <div class="logo-block">
        <a href="index.html" class="brand">
          <img src="pics/logo.svg" alt="JTC Concepts" class="site-logo">
        </a>
        <div class="logo-pattern" aria-hidden="true">
          <span class="logo-line">JTC</span>
          <span class="logo-line">JTC</span>
          <span class="logo-line concepts">CONCEPTS</span>
          <span class="logo-line">JTC</span>
          <span class="logo-line">JTC</span>
        </div>
      </div>
      <button class="mobile-nav-toggle" aria-label="Menu">☰</button>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="portfolio.html" class="active">Portfolio</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="login.html" class="btn-outline">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="container">
    <h1 class="page-title">Selected works</h1>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="kitchen">Kitchens</button>
      <button class="filter-btn" data-filter="wardrobe">Wardrobes</button>
      <button class="filter-btn" data-filter="wall">Wall units</button>
    </div>

    <div class="portfolio-grid" id="portfolio-gallery"></div>

    <div id="portfolio-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <img class="modal-img" src="" alt="">
        <h3 class="modal-title"></h3>
        <p class="modal-desc"></p>
      </div>
    </div>
  </main>
  <footer class="site-footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-logo">
          <div class="logo-pattern small" aria-hidden="true">
            <span>JTC</span><span>JTC</span><span class="concepts">CONCEPTS</span><span>JTC</span><span>JTC</span>
          </div>
        </div>
        <div class="footer-nav">
          <a href="about.html">About</a>
          <a href="services.html">Services</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="contact.html">Contact</a>
        </div>
        <div class="footer-legal">
          <p>© 2025 JTC Concepts</p>
        </div>
      </div>
    </div>
  </footer>
  <script src="js/main.js"></script>
</body>
</html>
