<!DOCTYPE html>

</head>
<body class="dashboard-layout">

      <div class="logo-pattern small">
        <span>JTC</span><span>JTC</span><span class="concepts">CONCEPTS</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <ul>
